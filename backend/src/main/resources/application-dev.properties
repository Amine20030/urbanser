# ==========================================
# UrbanOps Development Profile (FIX 6)
# ==========================================
# Active with: mvn spring-boot:run (default)
# Or: mvn spring-boot:run -Dspring-boot.run.profiles=dev

# Development logging — verbose for debugging
logging.level.ma.urbanops=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JPA/Hibernate — show SQL and auto-create schema
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# SQL initialization disabled — DataSeeder.java CommandLineRunner handles all data seeding
# spring.sql.init.mode=never

# Email — log only in dev (don't actually send)
# spring.mail.properties.mail.smtp.auth=false
# spring.mail.test-connection=false

# Scheduling — run more frequently in dev for testing
app.schedule.daily-summary-cron=0 */5 * * * *
app.schedule.overdue-check-rate=60000

# Debug settings
debug=true
