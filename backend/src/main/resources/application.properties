# ==========================================
# UrbanOps Backend Configuration
# ==========================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# ==========================================
# PostgreSQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/urbanops_db
spring.datasource.username=postgres
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=urbanops-super-secret-key-256bits-minimum-length-required-for-security
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==========================================
# File Upload Configuration
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
file.upload-dir=./uploads

# ==========================================
# Email Configuration (Gmail SMTP Example)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=urbanops.marrakech@gmail.com
spring.mail.password=yourapppassword
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# OpenAPI / Swagger Configuration
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true

# ==========================================
# AI API Configuration (Gemini)
# ==========================================
ai.gemini.api-key=YOUR_GEMINI_API_KEY_HERE
ai.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
ai.gemini.timeout=30000

# ==========================================
# Logging Configuration
# ==========================================
logging.level.ma.urbanops=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/urbanops.log
logging.file.max-size=10MB
logging.file.max-history=30

# ==========================================
# CORS Configuration
# ==========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173
