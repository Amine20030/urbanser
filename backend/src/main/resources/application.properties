# ==========================================
# UrbanOps Backend Configuration
# ==========================================

# Server Configuration
server.port=8080
# FIX 5: API versioning — all endpoints prefixed with /api/v1
server.servlet.context-path=/api/v1

# ==========================================
# PostgreSQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/urbanops_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# JWT Configuration
# ==========================================
# JJWT 0.12.x requires Base64-encoded secret of at least 32 bytes (256 bits)
# This is a 64-byte (512-bit) key — more than enough for HS512
# Generate with: echo -n "your-secret" | base64
jwt.secret=dXJiYW5vcHMtc3VwZXItc2VjcmV0LWtleS0yNTZiaXRzLW1pbmltdW0tbGVuZ3RoLXJlcXVpcmVkLWZvci1zZWN1cml0eQ==
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==========================================
# File Upload Configuration
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
file.upload-dir=./uploads

# ==========================================
# Email Configuration (Gmail SMTP Example)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=urbanops.marrakech@gmail.com
spring.mail.password=yourapppassword
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# OpenAPI / Swagger Configuration
# ==========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true

# ==========================================
# Spring Boot Actuator Configuration (FIX 4)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=UrbanOps
management.info.app.description=Système de supervision urbaine - Marrakech
management.info.app.version=1.0.0

# ==========================================
# AI API Configuration (Gemini)
# ==========================================
ai.gemini.api-key=AIzaSyDuZIr-fDnEDJHtjSjKUcmlDqZXwUY9sCg
ai.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
ai.gemini.timeout=30000

# ==========================================
# Logging Configuration
# ==========================================
logging.level.ma.urbanops=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/urbanops.log
logging.file.max-size=10MB
logging.file.max-history=30

# ==========================================
# CORS Configuration
# ==========================================
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,http://localhost:5173

# ==========================================
# Spring Profiles (FIX 6)
# ==========================================
# Default profile — override with: mvn spring-boot:run -Dspring-boot.run.profiles=prod
spring.profiles.active=dev

# ==========================================
# JMS — ActiveMQ Artemis embedded (no external broker)
# ==========================================
spring.artemis.mode=embedded
spring.artemis.embedded.enabled=true
spring.artemis.embedded.persistent=false
spring.jms.pub-sub-domain=false

# Queue names
jms.queue.alert=urbanops.alert.queue
jms.queue.email=urbanops.email.queue

# ==========================================
# RMI — AI analysis remote service
# ==========================================
rmi.port=1099

# ==========================================
# SQL Initialization
# ==========================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
