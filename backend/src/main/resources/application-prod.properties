# ==========================================
# UrbanOps Production Profile (FIX 6)
# ==========================================
# Active with: mvn spring-boot:run -Dspring-boot.run.profiles=prod
# Or: java -jar -Dspring.profiles.active=prod target/urbanops-backend-1.0.0.jar

# Production logging — minimal, performance-focused
logging.level.ma.urbanops=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN

# JPA/Hibernate — no SQL logging, validate schema only (no auto-create)
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Connection Pool — optimized for production load
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# No SQL initialization in production
spring.sql.init.mode=never

# Email — production SMTP settings (example)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=prod@urbanops.ma
# spring.mail.password=${MAIL_PASSWORD}

# Actuator — restrict exposed endpoints in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Scheduling — standard production intervals
app.schedule.daily-summary-cron=0 0 8 * * *
app.schedule.overdue-check-rate=1800000

# Performance optimizations
spring.jackson.serialization.indent-output=false
server.compression.enabled=true
server.http2.enabled=true
